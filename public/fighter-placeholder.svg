<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" role="img" aria-labelledby="title desc">
  <title id="title">Fighter placeholder</title>
  <desc id="desc">Placeholder image shown when a fighter image is missing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#151515" />
      <stop offset="100%" stop-color="#2f2f2f" />
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#4a4a4a" stroke-width="1" />
    </pattern>
  </defs>

  <rect width="800" height="1200" fill="url(#bg)" />
  <rect width="800" height="1200" fill="url(#grid)" opacity="0.45" />

  <g transform="translate(400 520)">
    <circle cx="0" cy="-80" r="90" fill="#3b3b3b" />
    <path d="M -170 180 C -170 40, -95 -40, 0 -40 C 95 -40, 170 40, 170 180" fill="#3b3b3b" />
  </g>

  <text
    x="400"
    y="1040"
    text-anchor="middle"
    fill="#d0d0d0"
    font-family="Arial, sans-serif"
    font-size="54"
    font-weight="700"
    letter-spacing="8"
  >
    FIGHTER
  </text>
</svg>
